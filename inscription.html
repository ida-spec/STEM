<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moon - Connexion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar" id="main-navbar" style="display:none;">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">🌸 moon</a>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link active">Dashboard</a></li>
                <li><a href="ajouter.html" class="nav-link">Ajouter</a></li>
                <li><a href="parametre.html" class="nav-link">Paramètres</a></li>
                <li><a href="#" class="nav-link logout-btn" onclick="logout()">Déconnexion</a></li>
            </ul>
        </div>
    </nav>


<section class="auth-container">
    <div class="auth-card">
        <h1 class="auth-title">🌸 Moon</h1>
        <p class="auth-subtitle">Connexion / Inscription</p>

        <div class="auth-tabs">
            <button class="auth-tab active" onclick="switchTab('login')">Connexion</button>
            <button class="auth-tab" onclick="switchTab('signup')">Inscription</button>
        </div>

        <!-- CONNEXION -->
        <form id="login-form" class="auth-form active">
            <div class="form-group">
                <label for="login-email">Email</label>
                <input type="email" id="login-email" placeholder="votre@email.com" required>
            </div>
            <div class="form-group">
                <label for="login-password">Mot de passe</label>
                <input type="password" id="login-password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Se connecter</button>
        </form>

        <!-- INSCRIPTION -->
        <form id="signup-form" class="auth-form">
            <div class="form-group">
                <label for="signup-name">Prénom</label>
                <input type="text" id="signup-name" placeholder="Votre prénom" required>
            </div>
            <div class="form-group">
                <label for="signup-email">Email</label>
                <input type="email" id="signup-email" placeholder="votre@email.com" required>
            </div>
            <div class="form-group">
                <label for="signup-password">Mot de passe</label>
                <input type="password" id="signup-password" placeholder="••••••••" required>
            </div>
            <div class="form-group">
                <label for="signup-lastPeriod">Date de début de vos dernières règles</label>
                <input type="date" id="signup-lastPeriod" required>
            </div>
            <div class="form-group">
                <label for="signup-periodLength">Durée de vos règles (jours)</label>
                <input type="number" id="signup-periodLength" min="2" max="10" value="5" required>
            </div>
            <div class="form-group">
                <label for="signup-cycle">Durée de votre cycle (jours)</label>
                <input type="number" id="signup-cycle" min="21" max="40" value="28" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Créer mon compte</button>
        </form>
    </div>
</section>

<script>
function switchTab(tab) {
    document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    if (tab === 'login') {
        document.getElementById('login-form').classList.add('active');
        document.querySelectorAll('.auth-tab')[0].classList.add('active');
    } else {
        document.getElementById('signup-form').classList.add('active');
        document.querySelectorAll('.auth-tab')[1].classList.add('active');
    }
}

// INSCRIPTION
document.getElementById("signup-form").addEventListener("submit", function (e) {
    e.preventDefault();

    const name = document.getElementById("signup-name").value.trim();
    const email = document.getElementById("signup-email").value.trim();
    const password = document.getElementById("signup-password").value;
    const lastPeriod = document.getElementById("signup-lastPeriod").value;
    const periodLength = parseInt(document.getElementById("signup-periodLength").value);
    const cycle = parseInt(document.getElementById("signup-cycle").value);

    let users = JSON.parse(localStorage.getItem("users")) || [];
    if (users.find(u => u.email === email)) {
        alert("Un compte existe déjà avec cet email.");
        return;
    }

    const user = { name, email, password, lastPeriod, periodLength, cycle };
    users.push(user);
    localStorage.setItem("users", JSON.stringify(users));
    localStorage.setItem("currentUser", JSON.stringify(user));

    window.location.href = "index.html";
});

// CONNEXION
document.getElementById("login-form").addEventListener("submit", function (e) {
    e.preventDefault();

    const email = document.getElementById("login-email").value.trim();
    const password = document.getElementById("login-password").value;

    const users = JSON.parse(localStorage.getItem("users")) || [];
    const user = users.find(u => u.email === email && u.password === password);

    if (user) {
        localStorage.setItem("currentUser", JSON.stringify(user));
        window.location.href = "index.html";
    } else {
        alert("Email ou mot de passe incorrect.");
    }
});
</script>

</body>
</html>
