<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moon - Symptômes</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .phase-container {
            background: white;
            width: 90%;
            max-width: 900px;
            margin: 60px auto;
            padding: 2rem;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .phase-container h2 {
            margin-bottom: 0.5rem;
            color: #1e293b;
        }
        .phase-container .subtitle {
            color: #64748b;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .option-btn {
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            background: white;
            color: #1e293b;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .option-btn:hover { border-color: #ec4899; }
        .option-btn.active {
            background: #fce7f3;
            border-color: #ec4899;
            color: #be185d;
            font-weight: 600;
        }
        .button-group {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .btn-back {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            background: #f1f5f9;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-next {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #ec4899, #8b5cf6);
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }
        .btn-next:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .counter {
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 1rem;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">🌸 moon</div>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Dashboard</a></li>
                <li><a href="ajouter.html" class="nav-link active">Ajouter</a></li>
                <li><a href="parametre.html" class="nav-link">Paramètres</a></li>
                <li><a href="#" class="nav-link logout-btn" onclick="logout()">Déconnexion</a></li>
            </ul>
        </div>
    </nav>

    <div class="phase-container">
        <h2>Comment te sens-tu aujourd'hui ?</h2>
        <p class="subtitle">Sélectionne au moins 2 symptômes pour que je puisse analyser ta phase</p>

        <div class="grid">
            <button class="option-btn" onclick="toggle(this,'glaire')">💧 Glaire abondante</button>
            <button class="option-btn" onclick="toggle(this,'energie')">⚡ Énergie élevée</button>
            <button class="option-btn" onclick="toggle(this,'libido')">💗 Libido élevée</button>
            <button class="option-btn" onclick="toggle(this,'douleur')">😣 Douleur bas-ventre</button>
            <button class="option-btn" onclick="toggle(this,'fatigue')">😴 Fatigue</button>
            <button class="option-btn" onclick="toggle(this,'sensibilite')">🌸 Sensibilité</button>
            <button class="option-btn" onclick="toggle(this,'temperature')">🌡️ Température élevée</button>
            <button class="option-btn" onclick="toggle(this,'motivation')">🎯 Motivation</button>
            <button class="option-btn" onclick="toggle(this,'humeur')">😊 Humeur stable</button>
            <button class="option-btn" onclick="toggle(this,'creativite')">🎨 Créativité</button>
        </div>

        <p class="counter" id="counter">0 symptôme(s) sélectionné(s)</p>

        <div class="button-group">
            <button class="btn-back" onclick="goBack()">← Retour</button>
            <button id="nextBtn" class="btn-next" onclick="analyser()" disabled>Analyser →</button>
        </div>
    </div>

<script>
    // Guard connexion
    (function () {
        const user = JSON.parse(localStorage.getItem("currentUser"));
        if (!user || !user.email) window.location.href = "inscription.html";
    })();

    let symptomes = {};

    function toggle(btn, symptome) {
        symptomes[symptome] = !symptomes[symptome];
        btn.classList.toggle("active");
        updateButton();
    }

    function updateButton() {
        const count = Object.values(symptomes).filter(Boolean).length;
        document.getElementById("nextBtn").disabled = count < 2;
        document.getElementById("counter").innerText = count + " symptôme(s) sélectionné(s)";
    }

    function goBack() { history.back(); }

    function analyser() {
        let scoreOvulation = 0;
        let scoreFolli = 0;

        if (symptomes.glaire) scoreOvulation++;
        if (symptomes.energie) scoreOvulation++;
        if (symptomes.libido) scoreOvulation++;
        if (symptomes.douleur) scoreOvulation++;
        if (symptomes.temperature) scoreOvulation++;

        if (symptomes.motivation) scoreFolli++;
        if (symptomes.humeur) scoreFolli++;
        if (symptomes.creativite) scoreFolli++;
        if (symptomes.fatigue) scoreFolli++;
        if (symptomes.sensibilite) scoreFolli++;

        if (scoreOvulation >= 3) {
            window.location.href = "conseilsovul.html";
        } else if (scoreFolli >= 2) {
            window.location.href = "conseilsfolli.html";
        } else {
            alert("⚠️ Les symptômes sélectionnés ne permettent pas de déterminer clairement ta phase. Essaie d'en sélectionner d'autres.");
        }
    }

    function logout() {
        localStorage.removeItem("currentUser");
        window.location.href = "inscription.html";
    }
</script>

</body>
</html>
