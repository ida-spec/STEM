<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moon - Suivi de Cycle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- NAVBAR (masquée sur auth) -->
    <nav class="navbar" id="main-navbar" style="display:none;">
        <div class="nav-container">
            <div class="nav-logo">🌸 moon</div>
            <ul class="nav-menu">
                <li><a href="#dashboard" class="nav-link active">Dashboard</a></li>
                <li><a href="choix.html" class="nav-link">Ajouter</a></li>
                <li><a href="#" class="nav-link">Historique</a></li>
                <li><a href="#" class="nav-link">Paramètres</a></li>
                <li><a href="#" class="nav-link logout-btn" onclick="logout()">Déconnexion</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">

        <!-- AUTH SECTION -->
        <section id="auth-section" class="auth-container">
            <div class="auth-card">
                <h1 class="auth-title">🌸 Moon</h1>
                <p class="auth-subtitle">Suivi de cycle menstruel</p>

                <div class="auth-tabs">
                    <button class="auth-tab active" onclick="switchAuthTab('login')">Connexion</button>
                    <button class="auth-tab" onclick="switchAuthTab('signup')">Inscription</button>
                </div>

                <!-- FORMULAIRE CONNEXION -->
                <form id="login-form" class="auth-form active">
                    <div class="form-group">
                        <label for="login-email">Email</label>
                        <input type="email" id="login-email" placeholder="votre@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Mot de passe</label>
                        <input type="password" id="login-password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">Se connecter</button>
                </form>

                <!-- FORMULAIRE INSCRIPTION -->
                <form id="signup-form" class="auth-form">
                    <div class="form-group">
                        <label for="signup-name">Prénom</label>
                        <input type="text" id="signup-name" placeholder="Votre prénom" required>
                    </div>
                    <div class="form-group">
                        <label for="signup-email">Email</label>
                        <input type="email" id="signup-email" placeholder="votre@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="signup-password">Mot de passe</label>
                        <input type="password" id="signup-password" placeholder="••••••••" required>
                    </div>
                    <div class="form-group">
                        <label for="signup-lastPeriod">Date de début de vos dernières règles</label>
                        <input type="date" id="signup-lastPeriod" required>
                    </div>
                    <div class="form-group">
                        <label for="signup-periodLength">Durée de vos règles (jours)</label>
                        <input type="number" id="signup-periodLength" min="2" max="10" value="5" required>
                    </div>
                    <div class="form-group">
                        <label for="signup-cycle">Durée de votre cycle (jours)</label>
                        <input type="number" id="signup-cycle" min="21" max="40" value="28" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">Créer mon compte</button>
                </form>
            </div>
        </section>

        <!-- DASHBOARD SECTION -->
        <section id="dashboard" class="section hidden">
            <div class="welcome-header">
                <h1>🌸 Bienvenue <span id="user-name">Utilisatrice</span> !</h1>
            </div>

            <div class="status-card">
                <div class="status-grid">
                    <div class="status-item">
                        <p class="status-label">Phase actuelle</p>
                        <p class="status-value" id="current-phase">—</p>
                        <p class="status-subtext" id="day-of-cycle">Jour — du cycle</p>
                    </div>
                    <div class="status-item">
                        <p class="status-label">Prochaines règles</p>
                        <p class="status-value" id="days-until">—</p>
                        <p class="status-subtext" id="cycle-length">Cycle de 28 jours</p>
                    </div>
                    <div class="status-item">
                        <p class="status-label">Ovulation estimée</p>
                        <p class="status-value" id="ovulation-date">—</p>
                        <p class="status-subtext">Date approximative</p>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <script src="cycle.js"></script>
</body>
</html>
